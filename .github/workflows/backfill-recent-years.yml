# Manual only: backfills the previous and current UTC calendar years (two `backfill` runs).
# Does not run on the daily cron — use when you need historical data without slowing routine syncs.
name: Backfill recent years

on:
  workflow_dispatch:

concurrency:
  group: backfill-recent-years
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    if: ${{ vars.GH_SYNC_SOURCE_USERNAME != '' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Backfill previous and current UTC calendar years
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_SYNC_SOURCE_USERNAME: ${{ vars.GH_SYNC_SOURCE_USERNAME }}
          GH_SYNC_TARGET_REPO: ${{ github.repository }}
          GH_SYNC_LOCAL_PATH: ${{ github.workspace }}
          GIT_AUTHOR_NAME: ${{ vars.GIT_AUTHOR_NAME }}
          GIT_AUTHOR_EMAIL: ${{ vars.GIT_AUTHOR_EMAIL }}
        run: |
          Y=$(date -u +%Y)
          PY=$((Y - 1))
          node dist/cli/index.js backfill --year "$PY"
          node dist/cli/index.js backfill --year "$Y"
